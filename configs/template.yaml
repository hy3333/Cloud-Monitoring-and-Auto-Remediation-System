AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Cloud infrastructure monitoring and automated remediation system

Resources:
  DecisionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.13
      Handler: app.lambda_handler
      CodeUri: ../lambda/decision/
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          LOG_TABLE_NAME: !Ref IncidentLogsTable
          SNS_TOPIC_ARN: !Ref IncidentTopic
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:Scan
                - dynamodb:Query
              Resource: !GetAtt IncidentLogsTable.Arn
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref IncidentTopic
      Events:
        ScheduledHealthCheck:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Triggers periodic health evaluation
            Enabled: false

  IncidentLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: log_id
          AttributeType: S
      KeySchema:
        - AttributeName: log_id
          KeyType: HASH

  IncidentTopic:
    Type: AWS::SNS::Topic